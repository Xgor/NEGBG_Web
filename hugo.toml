baseURL = 'https://negativeedge.se/'
languageCode = 'sv-SE'
title = 'Göteborgs största förening för fightingspel'
theme = 'hello-friend-ng'
pluralizeListTitles = false
timeZone = "Europe/Stockholm"
enableGlobalLanguageMenu = true
disableKinds = ["RSS"]
defaultContentLanguage = "sv"
defaultContentLanguageInSubdir = false
[minify]
  minifyOutput = true


[languages]
  [languages.sv]
    title = "Negative Edge - Göteborgs FGC"
    languageName = "Svenska"
    languageCode = "sv-SE"
    weight = 1
    [languages.sv.params]
      subtitle = "Göteborgs fightingspelsförening!"
      homeSubtitle = "Göteborgs fightingspelsförening – turneringar, casuals och community för alla fightingspel."
      description = "Göteborgs helt egna fightingspelsförening!"
      date_format = "Mon, 2 Jan 2006"
      datetime_format = "Mon 2 Jan 2006 kl. 15:04"
      time_format = "15:04"
  [languages.en]
    title = "Negative Edge - Gothenburg's FGC"
    languageName = "English"
    languageCode = "en-GB"
    weight = 2
    [languages.en.params]
      subtitle = "Gothenburg's fighting game community!"
      homeSubtitle = "Gothenburg's fighting game community – tournaments, casuals and a home for all fighting game players."
      description = "Gothenburg's very own fighting game community!"
      date_format = "Mon, Jan 2, 2006"
      datetime_format = "Mon, Jan 2, 2006 at 3:04 PM"
      time_format = "3:04 PM"
[params]
  timeZoneAbbr = "CET/CEST"
  customCSS = ["/css/custom.css"]
  enableSharingButtons = true
  enableGlobalLanguageMenu = true
  description = "Göteborgs helt egna fightingspelsförening!"

[params.logo]
    path = "/NegativeEdge_Minimal.svg"
    alt = "NE-logga"
[params.header.logo]
    path = "/NegativeEdge_Minimal.svg"
    alt = "NE-logga"


[params.author]
    name = "Negative Edge"

[params.footer]
  trademark = "Negative Edge 2026"
  rss = false

  [[params.social]]
    name = "discord"
    url  = "https://discord.gg/kMVJ55wwy7"

  [[params.social]]
    name = "twitter"
    url  = "https://x.com/negativeedgegbg"

  [[params.social]]
    name = "facebook"
    url  = "https://www.facebook.com/share/1B3JfCMQGS/"

  [[params.social]]
    name = "instagram"
    url = "https://www.instagram.com/goteborgfgc_negative_edge/"

  [[params.social]]
    name = "twitch"
    url  = "https://www.twitch.tv/negativeedgegbg"

  [[params.social]]
    name = "youtube"
    url = "https://www.youtube.com/@nedgegbg"

  [[params.social]]
    name = "email"
    url = "mailto:negativeedgegbg@gmail.com"

  [[params.social]]
    name = "matrix"
    url  = "https://matrix.to/#/!eCTTvSWDbcYCKFixSR:feffe.moe?via=feffe.moe&via=matrix.org"

[markup.goldmark.renderer]
  unsafe = true

[caches]
  [caches.images]
    dir = ':cacheDir'

[mediaTypes]
  [mediaTypes."text/calendar"]
    suffixes = ["ics"]

[outputFormats]
  [outputFormats.ical]
    mediaType = "text/calendar"
    baseName = "negative-edge-events"
    isPlainText = true
    notAlternative = true
